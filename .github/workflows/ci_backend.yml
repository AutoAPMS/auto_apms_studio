name: CI Backend

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  format_check_backend:
    name: Format check (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auto_apms_studio/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: auto_apms_studio/backend/pyproject.toml

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

  backend_test:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: [format_check_backend]
    defaults:
      run:
        working-directory: auto_apms_studio/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: auto_apms_studio/backend/pyproject.toml

      - name: Install package
        run: pip install -e .

      - name: Run pytest
        run: pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}
