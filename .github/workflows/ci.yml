name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  format_check_frontend:
    name: Format check (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

  format_check_backend:
    name: Format check (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auto_apms_studio/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: auto_apms_studio/backend/pyproject.toml

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

  backend_test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auto_apms_studio/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: auto_apms_studio/backend/pyproject.toml

      - name: Install package
        run: pip install -e .

      - name: Run pytest
        run: pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}

  frontend_test:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --cache .npm --prefer-offline

      - name: Run tests
        run: npm run test:run

  deploy_pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Build docs
        run: |
          npm install
          npm run docs:build

      - name: Assemble pages output
        run: |
          mkdir -p public
          cp -a web/dist/. public/
          cp -a docs/.vitepress/dist/. public/docs/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4